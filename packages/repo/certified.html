      /*
       * BrewCode OS i18n — 通用多语言加载器
       * 零框架依赖，词条内嵌，file:// 和 HTTP 双环境兼容
       * 体积 < 2KB
       */

      var BrewCodeI18n = (function () {
        'use strict';

        var lang = 'zh';
        var loaded = false;
        var callbacks = [];

        var DICT = {
          zh: {
            'certified.title': '已认证设备',
            'certified.subtitle': 'Certified Devices',
            'certified.filter.all': '全部',
            'certified.filter.l1': 'L1 Ready',
            'certified.filter.l2': 'L2 Interactive',
            'certified.filter.l3': 'L3 Native',
            'certified.card.certifiedDate': '认证日期',
            'certified.card.firmware': '固件版本',
            'certified.card.mapping': '参数映射表',
            'certified.card.deviceType': '设备类型',
            'certified.card.certId': '认证编号',
            'certified.empty': '暂无已认证设备',
            'certified.emptyHint': '认证设备名录即将上线，敬请期待。',
            'certified.footer': 'BrewCode Compatible · CC0',
            'certified.deviceType.手冲设备': '手冲设备',
            'certified.deviceType.意式咖啡机': '意式咖啡机',
            'certified.deviceType.浸泡式冲煮设备': '浸泡式冲煮设备',
            'certified.deviceType.研磨设备': '研磨设备',
            'certified.deviceType.冲煮辅助设备': '冲煮辅助设备',
            'certified.deviceType.其他': '其他',
            'nav.home': '首页',
            'nav.player': 'Player',
            'nav.repo': 'Repo',
            'nav.forge': 'Forge',
            'nav.certified': '认证设备',
            'repo.footer': 'BrewCode OS · CC0',
          },
          en: {
            'certified.title': 'Certified Devices',
            'certified.subtitle': '已认证设备',
            'certified.filter.all': 'All',
            'certified.filter.l1': 'L1 Ready',
            'certified.filter.l2': 'L2 Interactive',
            'certified.filter.l3': 'L3 Native',
            'certified.card.certifiedDate': 'Certified Date',
            'certified.card.firmware': 'Firmware',
            'certified.card.mapping': 'Parameter Mapping',
            'certified.card.deviceType': 'Device Type',
            'certified.card.certId': 'Certification ID',
            'certified.empty': 'No Certified Devices',
            'certified.emptyHint': 'The certified device directory is coming soon.',
            'certified.footer': 'BrewCode Compatible · CC0',
            'certified.deviceType.手冲设备': 'Pour-over Device',
            'certified.deviceType.意式咖啡机': 'Espresso Machine',
            'certified.deviceType.浸泡式冲煮设备': 'Immersion Brewer',
            'certified.deviceType.研磨设备': 'Grinder',
            'certified.deviceType.冲煮辅助设备': 'Brewing Accessory',
            'certified.deviceType.其他': 'Other',
            'nav.home': 'Home',
            'nav.player': 'Player',
            'nav.repo': 'Repo',
            'nav.forge': 'Forge',
            'nav.certified': 'Certified',
            'repo.footer': 'BrewCode OS · CC0',
          },
        };

        function t(key) {
          var dict = DICT[lang] || DICT.zh;
          return dict[key] || key;
        }

        function load() {
          if (loaded) return;
          loaded = true;
          for (var i = 0; i < callbacks.length; i++) callbacks[i]();
          callbacks = [];
        }

        function onReady(cb) {
          if (loaded) {
            cb();
          } else {
            callbacks.push(cb);
          }
        }

        function getLang() {
          return lang;
        }
        function setLang(l) {
          lang = l;
        }

        return { t: t, load: load, onReady: onReady, getLang: getLang, setLang: setLang };
      })();
    </script>

    <script>
      (function () {
        var isLocal =
          window.location.protocol === 'file:' ||
          window.location.hostname === 'localhost' ||
          window.location.hostname === '127.0.0.1';
        function getCookie(n) {
          var m = document.cookie.match(new RegExp('(^| )' + n + '=([^;]+)'));
          return m ? m[2] : null;
        }
        function setCookie(n, v) {
          document.cookie = n + '=' + v + ';path=/;max-age=31536000;SameSite=Lax';
        }
        function getShared(n, d) {
          var v = localStorage.getItem(n);
          if (v === null && !isLocal) {
            v = getCookie(n);
          }
          return v || d;
        }
        function setShared(n, v) {
          localStorage.setItem(n, v);
          setCookie(n, v);
        }
        var theme = getShared('brewcode_theme', 'dark');
        var lang = getShared('brewcode_lang', 'zh');
        function applyTheme(t) {
          document.documentElement.setAttribute('data-theme', t);
          document.querySelector('#bc-theme-btn').textContent = t === 'dark' ? '🌙' : '☀️';
          var isDark = t === 'dark';
          var root = document.documentElement.style;
          root.setProperty('--bg', isDark ? '#1a1a2e' : '#f5f0eb');
          root.setProperty('--bg-card', isDark ? '#222244' : '#ffffff');
          root.setProperty('--bg-card-hover', isDark ? '#2a2a50' : '#f0ece6');
          root.setProperty('--text', isDark ? '#e0e0e8' : '#1a1a2e');
          root.setProperty('--text-dim', isDark ? '#8888aa' : '#666680');
          root.setProperty('--accent', isDark ? '#e8a850' : '#b87333');
          root.setProperty('--accent-dim', isDark ? '#c08030' : '#9a5c20');
          root.setProperty('--border', isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.1)');
        }
        function applyLang(l) {
          document.querySelector('#bc-lang-btn').textContent = l === 'zh' ? 'EN' : '中';
          BrewCodeI18n.setLang(l);
          refreshI18n();
        }
        function refreshI18n() {
          var elements = document.querySelectorAll('[data-i18n]');
          for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            var key = el.getAttribute('data-i18n');
            if (key) {
              var tag = el.tagName;
              if (tag === 'INPUT' || tag === 'TEXTAREA') {
                el.placeholder = BrewCodeI18n.t(key);
              } else {
                el.textContent = BrewCodeI18n.t(key);
              }
            }
          }
          if (typeof renderCertifiedDevices === 'function') renderCertifiedDevices();
        }
        window.refreshI18n = refreshI18n;
        applyTheme(theme);
        applyLang(lang);
        document.querySelector('#bc-theme-btn').addEventListener('click', function () {
          theme = theme === 'dark' ? 'light' : 'dark';
          setShared('brewcode_theme', theme);
          applyTheme(theme);
        });
        document.querySelector('#bc-lang-btn').addEventListener('click', function () {
          lang = lang === 'zh' ? 'en' : 'zh';
          setShared('brewcode_lang', lang);
          applyLang(lang);
        });
        var hamburger = document.querySelector('#bc-hamburger');
        var links = document.querySelector('#bc-links');
        hamburger.addEventListener('click', function () {
          var isOpen = links.classList.toggle('open');
          hamburger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        });
        var anchors = links.querySelectorAll('a');
        for (var j = 0; j < anchors.length; j++) {
          anchors[j].addEventListener('click', function () {
            links.classList.remove('open');
            hamburger.setAttribute('aria-expanded', 'false');
          });
        }
        document.addEventListener('click', function (e) {
          if (!e.target.closest('#bc-navbar')) {
            links.classList.remove('open');
            hamburger.setAttribute('aria-expanded', 'false');
          }
        });
      })();
    </script>
