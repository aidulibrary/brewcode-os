<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="BrewCode OS BrewRepo - .brew 冲煮方案公共仓库" />
    <title>BrewRepo</title>
    <link rel="stylesheet" href="repo.css?v=20260615" />
    <style>
      .bc-navbar {
        display: flex;
        align-items: center;
        gap: 16px;
        height: 48px;
        padding: 0 20px;
        background: var(--bg, #1a1a2e);
        color: var(--text, #e0e0e8);
        border-bottom: 1px solid var(--border, rgba(255, 255, 255, 0.08));
        font-size: 14px;
        position: sticky;
        top: 0;
        z-index: 1000;
        box-sizing: border-box;
        flex-wrap: nowrap;
      }
      .bc-navbar .bc-logo {
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: inherit;
        flex-shrink: 0;
      }
      .bc-navbar .bc-logo svg {
        width: 22px;
        height: 22px;
      }
      .bc-navbar .bc-logo span {
        font-weight: 600;
      }
      .bc-navbar .bc-links {
        display: flex;
        gap: 8px;
        flex: 1;
        justify-content: flex-end;
      }
      .bc-navbar .bc-links a {
        color: var(--text-dim, #8888aa);
        text-decoration: none;
        padding: 6px 12px;
        border-radius: var(--radius-sm, 8px);
        transition:
          color 0.2s,
          background 0.2s;
        white-space: nowrap;
      }
      .bc-navbar .bc-links a.active {
        color: var(--accent, #e8a850);
        border-bottom: 2px solid var(--accent, #e8a850);
      }
      .bc-navbar .bc-links a:hover {
        color: var(--text, #e0e0e8);
        background: rgba(255, 255, 255, 0.05);
      }
      .bc-navbar .bc-actions {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-shrink: 0;
      }
      .bc-navbar .bc-actions button {
        background: none;
        border: 1px solid var(--border, rgba(255, 255, 255, 0.08));
        color: var(--text-dim, #8888aa);
        padding: 4px 10px;
        border-radius: var(--radius-sm, 8px);
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
        transition:
          color 0.2s,
          border-color 0.2s;
      }
      .bc-navbar .bc-actions button:hover {
        color: var(--text, #e0e0e8);
        border-color: var(--accent, #e8a850);
      }
      .bc-navbar .bc-hamburger {
        display: none;
        background: none;
        border: none;
        color: var(--text, #e0e0e8);
        font-size: 20px;
        cursor: pointer;
      }
      @media (max-width: 640px) {
        .bc-navbar .bc-links {
          display: none;
          position: absolute;
          top: 48px;
          left: 0;
          right: 0;
          flex-direction: column;
          background: var(--bg, #1a1a2e);
          border-bottom: 1px solid var(--border, rgba(255, 255, 255, 0.08));
          padding: 8px 0;
          z-index: 999;
        }
        .bc-navbar .bc-links.open {
          display: flex;
        }
        .bc-navbar .bc-hamburger {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <!-- 导航栏（v0.9 — 统一导航栏试点） -->
    <nav class="bc-navbar" id="bc-navbar">
      <a class="bc-logo" href="https://brewcode.礼字号.中国">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" />
          <text x="12" y="17" text-anchor="middle" font-size="14" fill="currentColor">{}</text>
        </svg>
        <span>BrewCode</span>
      </a>
      <button class="bc-hamburger" id="bc-hamburger" aria-label="菜单">☰</button>
      <div class="bc-links" id="bc-links">
        <a href="https://brewcode.礼字号.中国">首页</a>
        <a href="https://player.礼字号.中国">Player</a>
        <a href="https://repo.礼字号.中国" class="active">Repo</a>
        <a href="https://forge.礼字号.中国">Forge</a>
      </div>
      <div class="bc-actions">
        <button id="bc-theme-btn" title="切换主题">🌙</button>
        <button id="bc-lang-btn" title="切换语言">EN</button>
      </div>
    </nav>
    <script>
      (function () {
        var theme = localStorage.getItem('brewcode_theme') || 'dark';
        var lang = localStorage.getItem('brewcode_lang') || 'zh';
        function applyTheme(t) {
          document.documentElement.setAttribute('data-theme', t);
          document.querySelector('#bc-theme-btn').textContent = t === 'dark' ? '🌙' : '☀️';
        }
        function applyLang(l) {
          document.querySelector('#bc-lang-btn').textContent = l === 'zh' ? 'EN' : '中';
        }
        applyTheme(theme);
        applyLang(lang);
        document.querySelector('#bc-theme-btn').addEventListener('click', function () {
          theme = theme === 'dark' ? 'light' : 'dark';
          localStorage.setItem('brewcode_theme', theme);
          applyTheme(theme);
        });
        document.querySelector('#bc-lang-btn').addEventListener('click', function () {
          lang = lang === 'zh' ? 'en' : 'zh';
          localStorage.setItem('brewcode_lang', lang);
          applyLang(lang);
        });
        var hamburger = document.querySelector('#bc-hamburger');
        var links = document.querySelector('#bc-links');
        links.querySelectorAll('a').forEach(function (link) {
          link.addEventListener('click', function () {
            links.classList.remove('open');
          });
        });
        hamburger.addEventListener('click', function () {
          links.classList.toggle('open');
        });
        document.addEventListener('click', function (e) {
          if (!e.target.closest('#bc-navbar')) {
            links.classList.remove('open');
          }
        });
      })();
    </script>
    <div id="app">
      <header id="top-bar">
        <a href="../player/" class="brand">BrewRepo</a>
        <span class="brand-sub">冲煮方案公共仓库</span>
      </header>

      <div id="stats-bar">
        <span id="stats-text">加载中…</span>
      </div>

      <div id="filter-bar">
        <div class="filter-section">
          <span class="filter-label">器具</span>
          <div id="filter-brewer" class="filter-pills"></div>
        </div>
        <div class="filter-section">
          <span class="filter-label">烘焙度</span>
          <div id="filter-roast" class="filter-pills"></div>
        </div>
        <div class="filter-section">
          <span class="filter-label">产区</span>
          <div id="filter-country" class="filter-pills"></div>
        </div>
        <div class="filter-section">
          <span class="filter-label">搜索</span>
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="搜索方案名、产区、作者…"
          />
          <button id="btn-clear-search" class="btn-clear hidden">✕</button>
        </div>
        <button id="btn-reset" class="btn-reset">清除筛选</button>
      </div>

      <div id="results-summary">
        <span id="results-count"></span>
      </div>

      <main id="card-grid"></main>

      <div id="empty-state" class="hidden">
        <p class="empty-msg">没有匹配的方案</p>
        <p class="empty-hint">试试调整筛选条件或搜索关键词</p>
      </div>

      <div id="detail-overlay" class="hidden">
        <div class="detail-backdrop"></div>
        <div class="detail-card">
          <button id="btn-detail-close" class="btn-close">✕</button>
          <h2 id="detail-name"></h2>
          <p id="detail-author" class="detail-meta"></p>
          <div class="detail-section">
            <h3>咖啡豆</h3>
            <div id="detail-coffee" class="detail-grid"></div>
          </div>
          <div class="detail-section">
            <h3>冲煮参数</h3>
            <div id="detail-recipe" class="detail-grid"></div>
          </div>
          <div class="detail-section">
            <h3>风味笔记</h3>
            <div id="detail-flavors" class="flavor-chips"></div>
          </div>
          <div class="detail-actions">
            <button id="btn-open-player" class="btn btn-primary">在 Player 中打开</button>
            <button id="btn-copy-json" class="btn btn-ghost">复制 .brew 内容</button>
          </div>
        </div>
      </div>

      <footer id="footer">
        <span>BrewCode OS · CC0</span>
        <a href="https://github.com/aidulibrary/brewcode-os" target="_blank" rel="noopener"
          >GitHub</a
        >
      </footer>
    </div>

    <script src="repo.js?v=20260615"></script>
  </body>
</html>
