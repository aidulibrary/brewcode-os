<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="BrewCode OS BrewForge - .brew 文件可视化编辑器" />
    <title>BrewForge</title>
    <link rel="stylesheet" href="forge.css" />
  </head>
  <body>
    <div id="app">
      <header id="forge-header">
        <h1 class="brand">BrewForge</h1>
        <p class="sub">可视化 .brew 方案编辑器</p>
      </header>

      <main id="forge-main">
        <!-- 方案信息 -->
        <section class="form-section">
          <h2 class="section-title">方案信息</h2>
          <div class="form-grid">
            <label class="field">
              <span class="field-label">方案名称</span>
              <input
                type="text"
                id="inp-meta-name"
                class="input"
                placeholder="例如：夏季八冲 · 埃塞俄比亚 日晒 古吉"
              />
            </label>
            <label class="field">
              <span class="field-label">版本号</span>
              <input type="text" id="inp-meta-version" class="input" placeholder="1.0.0" />
            </label>
            <label class="field">
              <span class="field-label">作者</span>
              <input type="text" id="inp-meta-author" class="input" placeholder="您的名字或 ID" />
            </label>
            <label class="field">
              <span class="field-label">许可证</span>
              <select id="inp-meta-license" class="input">
                <option value="CC0">CC0 — 完全公共领域</option>
                <option value="MIT">MIT</option>
                <option value="CC-BY-4.0">CC-BY-4.0</option>
              </select>
            </label>
            <label class="field field-span-2">
              <span class="field-label">方案描述</span>
              <textarea
                id="inp-meta-desc"
                class="input"
                rows="2"
                placeholder="简短描述冲煮方案的特点与风味…"
              ></textarea>
            </label>
            <label class="field field-span-2">
              <span class="field-label">标签</span>
              <input
                type="text"
                id="inp-meta-tags"
                class="input"
                placeholder="V60, 浅烘, 日晒, 埃塞俄比亚（逗号分隔）"
              />
            </label>
            <label class="field field-span-2">
              <span class="field-label">来源 URL</span>
              <input type="text" id="inp-meta-source" class="input" placeholder="https://..." />
            </label>
          </div>
        </section>

        <!-- 咖啡豆信息 -->
        <section class="form-section">
          <h2 class="section-title">咖啡豆信息</h2>
          <div class="form-grid">
            <label class="field field-span-2">
              <span class="field-label">咖啡豆名称</span>
              <input
                type="text"
                id="inp-coffee-name"
                class="input"
                placeholder="例如：埃塞俄比亚 耶加雪菲 日晒 浅烘"
              />
            </label>
            <label class="field">
              <span class="field-label">生产者 / 庄园</span>
              <input
                type="text"
                id="inp-coffee-producer"
                class="input"
                placeholder="例如：耶加雪菲合作社"
              />
            </label>
            <label class="field">
              <span class="field-label">豆种</span>
              <input
                type="text"
                id="inp-coffee-variety"
                class="input"
                placeholder="Heirloom / Bourbon / Geisha"
              />
            </label>
            <label class="field">
              <span class="field-label">产国</span>
              <input type="text" id="inp-coffee-country" class="input" placeholder="埃塞俄比亚" />
            </label>
            <label class="field">
              <span class="field-label">产区</span>
              <input type="text" id="inp-coffee-region" class="input" placeholder="耶加雪菲" />
            </label>
            <label class="field">
              <span class="field-label">庄园 / 处理站</span>
              <input type="text" id="inp-coffee-farm" class="input" placeholder="Aricha 处理站" />
            </label>
            <label class="field">
              <span class="field-label">海拔</span>
              <input type="text" id="inp-coffee-altitude" class="input" placeholder="1900-2100m" />
            </label>
            <label class="field">
              <span class="field-label">处理法</span>
              <input
                type="text"
                id="inp-coffee-process"
                class="input"
                placeholder="日晒 / 水洗 / 蜜处理"
              />
            </label>
            <label class="field">
              <span class="field-label">烘焙度</span>
              <select id="inp-coffee-roastLevel" class="input">
                <option value="极浅烘">极浅烘</option>
                <option value="浅烘">浅烘</option>
                <option value="中浅烘">中浅烘</option>
                <option value="中烘" selected>中烘</option>
                <option value="中深烘">中深烘</option>
                <option value="深烘">深烘</option>
                <option value="极深烘">极深烘</option>
              </select>
            </label>
            <label class="field">
              <span class="field-label">烘焙商</span>
              <input type="text" id="inp-coffee-roaster" class="input" placeholder="烘焙商名称" />
            </label>
            <label class="field">
              <span class="field-label">烘焙日期</span>
              <input type="date" id="inp-coffee-roastDate" class="input" />
            </label>
            <label class="field field-span-2">
              <span class="field-label">风味描述</span>
              <input
                type="text"
                id="inp-coffee-flavorNotes"
                class="input"
                placeholder="蓝莓, 草莓, 紫罗兰, 蜂蜜（逗号分隔）"
              />
            </label>
          </div>
        </section>

        <!-- 器具信息 -->
        <section class="form-section">
          <h2 class="section-title">器具信息</h2>
          <div class="form-grid">
            <label class="field">
              <span class="field-label">冲煮器具</span>
              <input
                type="text"
                id="inp-equip-brewer"
                class="input"
                placeholder="V60 / Kalita Wave / Origami / Chemex / 爱乐压"
              />
            </label>
            <label class="field">
              <span class="field-label">滤杯材质</span>
              <input
                type="text"
                id="inp-equip-material"
                class="input"
                placeholder="陶瓷 / 树脂 / 玻璃 / 金属"
              />
            </label>
            <label class="field">
              <span class="field-label">滤杯规格</span>
              <input
                type="text"
                id="inp-equip-size"
                class="input"
                placeholder="01 / 02 / 155 / 185 / S"
              />
            </label>
            <label class="field">
              <span class="field-label">滤纸</span>
              <input
                type="text"
                id="inp-equip-filter"
                class="input"
                placeholder="V60 漂白 01 / Kalita 波浪 155"
              />
            </label>
            <label class="field">
              <span class="field-label">磨豆机</span>
              <input
                type="text"
                id="inp-equip-grinder"
                class="input"
                placeholder="Comandante C40 / EK43"
              />
            </label>
            <label class="field">
              <span class="field-label">手冲壶</span>
              <input
                type="text"
                id="inp-equip-kettle"
                class="input"
                placeholder="Brewista 温控壶"
              />
            </label>
            <label class="field">
              <span class="field-label">电子秤</span>
              <input type="text" id="inp-equip-scale" class="input" placeholder="Acaia Pearl" />
            </label>
            <label class="field">
              <span class="field-label">分享壶</span>
              <input
                type="text"
                id="inp-equip-server"
                class="input"
                placeholder="Hario 01 分享壶"
              />
            </label>
          </div>
        </section>

        <!-- 冲煮参数 -->
        <section class="form-section">
          <h2 class="section-title">冲煮参数</h2>
          <div class="form-grid">
            <label class="field">
              <span class="field-label">粉量 (g)</span>
              <input
                type="number"
                id="inp-recipe-dose"
                class="input"
                value="15"
                step="0.1"
                min="0"
              />
            </label>
            <label class="field">
              <span class="field-label">总注水量 (ml)</span>
              <input
                type="number"
                id="inp-recipe-waterAmount"
                class="input"
                value="225"
                step="1"
                min="0"
              />
            </label>
            <label class="field">
              <span class="field-label">粉水比</span>
              <input type="text" id="inp-recipe-ratio" class="input" placeholder="1:15" />
            </label>
            <label class="field">
              <span class="field-label">水温 (°C)</span>
              <input
                type="number"
                id="inp-recipe-waterTemp"
                class="input"
                value="93"
                step="0.5"
                min="0"
              />
            </label>
            <label class="field">
              <span class="field-label">研磨刻度</span>
              <input
                type="number"
                id="inp-recipe-grindValue"
                class="input"
                value="22"
                step="1"
                min="0"
              />
            </label>
            <label class="field">
              <span class="field-label">研磨参考系</span>
              <input
                type="text"
                id="inp-recipe-grindUnit"
                class="input"
                placeholder="C40 click / EK43 刻度 / μm"
              />
            </label>
            <label class="field field-span-2">
              <span class="field-label">研磨度描述</span>
              <input type="text" id="inp-recipe-grindDesc" class="input" placeholder="细砂糖粗细" />
            </label>
            <label class="field">
              <span class="field-label">用水类型</span>
              <input
                type="text"
                id="inp-recipe-waterType"
                class="input"
                placeholder="农夫山泉 / 过滤水 / 调配水"
              />
            </label>
            <label class="field">
              <span class="field-label">水 TDS (ppm)</span>
              <input
                type="number"
                id="inp-recipe-waterTDS"
                class="input"
                step="1"
                min="0"
                placeholder="45"
              />
            </label>
            <label class="field">
              <span class="field-label">目标冲煮时间 (s)</span>
              <input
                type="number"
                id="inp-recipe-brewTime"
                class="input"
                value="150"
                step="1"
                min="0"
              />
            </label>
            <label class="field">
              <span class="field-label">闷蒸水量比例</span>
              <input type="text" id="inp-recipe-bloomRatio" class="input" placeholder="1:3" />
            </label>
            <label class="field">
              <span class="field-label">闷蒸时间 (s)</span>
              <input
                type="number"
                id="inp-recipe-bloomTime"
                class="input"
                value="30"
                step="1"
                min="0"
              />
            </label>
            <label class="field">
              <span class="field-label">目标 TDS (%)</span>
              <input
                type="number"
                id="inp-recipe-targetTDS"
                class="input"
                step="0.01"
                min="0"
                placeholder="1.35"
              />
            </label>
            <label class="field">
              <span class="field-label">目标萃取率 (%)</span>
              <input
                type="number"
                id="inp-recipe-targetExtraction"
                class="input"
                step="0.1"
                min="0"
                placeholder="20.5"
              />
            </label>
          </div>
        </section>
      </main>

      <footer id="forge-footer">
        <span class="footer-hint">所有输入即时保存到状态中</span>
      </footer>
    </div>

    <script src="forge.js"></script>
  </body>
</html>
