      /*
       * BrewCode OS i18n — 通用多语言加载器
       * 零框架依赖，词条内嵌，file:// 和 HTTP 双环境兼容
       */

      var BrewCodeI18n = (function () {
        'use strict';

        var lang = 'en';
        var loaded = false;
        var callbacks = [];

        var DICT = {
          zh: {
            'nav.home': '首页',
            'nav.player': 'Player',
            'nav.repo': 'Repo',
            'nav.forge': 'Forge',
            'nav.cert': '认证设备',
            'title.brand': 'BrewCode',
            'title.sub': '兼容认证设备库',
            'stats.total': '共',
            'stats.devices': '台认证设备',
            'filter.all': '全部',
            'filter.l1': 'L1 Ready',
            'filter.l2': 'L2 Interactive',
            'filter.l3': 'L3 Native',
            loading: '加载中…',
            'error.load': '加载失败，请稍后重试',
            empty: '暂无认证设备',
            'empty.hint': '第一台设备正在认证路上…',
            'cert.id': '认证编号',
            'cert.manufacturer': '厂商',
            'cert.model': '型号',
            'cert.level': '等级',
            'cert.date': '认证日期',
            'cert.description': '描述',
            'cert.paramMapping': '参数映射',
            'detail.close': '关闭',
            'apply.title': '申请认证',
            'apply.desc': '您的设备也想加入？',
            'apply.button': '提交认证申请',
            'footer.license': 'BrewCode OS · CC0',
            'level.l1.name': '就绪级',
            'level.l2.name': '交互级',
            'level.l3.name': '原生级',
            'level.l1.desc': '核心参数接收',
            'level.l2.desc': '步骤序列执行',
            'level.l3.desc': '数据记录回写',
          },
          en: {
            'nav.home': 'Home',
            'nav.player': 'Player',
            'nav.repo': 'Repo',
            'nav.forge': 'Forge',
            'nav.cert': 'Certified',
            'title.brand': 'BrewCode',
            'title.sub': 'Certified Devices',
            'stats.total': 'Total',
            'stats.devices': 'certified devices',
            'filter.all': 'All',
            'filter.l1': 'L1 Ready',
            'filter.l2': 'L2 Interactive',
            'filter.l3': 'L3 Native',
            loading: 'Loading…',
            'error.load': 'Failed to load, please try again later',
            empty: 'No certified devices yet',
            'empty.hint': 'First device is on the way…',
            'cert.id': 'Cert ID',
            'cert.manufacturer': 'Manufacturer',
            'cert.model': 'Model',
            'cert.level': 'Level',
            'cert.date': 'Certified Date',
            'cert.description': 'Description',
            'cert.paramMapping': 'Parameter Mapping',
            'detail.close': 'Close',
            'apply.title': 'Apply Certification',
            'apply.desc': 'Want to add your device?',
            'apply.button': 'Submit Application',
            'footer.license': 'BrewCode OS · CC0',
            'level.l1.name': 'L1 Ready',
            'level.l2.name': 'L2 Interactive',
            'level.l3.name': 'L3 Native',
            'level.l1.desc': 'Core params reception',
            'level.l2.desc': 'Step sequence execution',
            'level.l3.desc': 'Data recording & write-back',
          },
        };

        function t(key) {
          var dict = DICT[lang] || DICT['zh'];
          return dict[key] || key;
        }

        function setLang(newLang) {
          lang = newLang;
          refreshTexts();
          if (window.refreshCertPage) {
            window.refreshCertPage();
          }
        }

        function refreshTexts() {
          var elements = document.querySelectorAll('[data-i18n]');
          for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            var key = el.getAttribute('data-i18n');
            if (key) {
              var tag = el.tagName;
              if (tag === 'INPUT' || tag === 'TEXTAREA') {
                el.placeholder = t(key);
              } else {
                el.textContent = t(key);
              }
            }
          }
        }

        return {
          t: t,
          setLang: setLang,
          getLang: function () {
            return lang;
          },
          refreshTexts: refreshTexts,
        };
      })();

      window.BrewCodeI18n = BrewCodeI18n;
    </script>

    <script>
      (function () {
        var isLocal =
          window.location.protocol === 'file:' ||
          window.location.hostname === 'localhost' ||
          window.location.hostname === '127.0.0.1';
        function getCookie(n) {
          var m = document.cookie.match(new RegExp('(^| )' + n + '=([^;]+)'));
          return m ? m[2] : null;
        }
        function setCookie(n, v) {
          document.cookie =
            n +
            '=' +
            v +
            '; path=/; max-age=31536000; SameSite=Lax' +
            (isLocal ? '' : '; domain=.礼字号.中国');
        }
        function getShared(n, d) {
          return getCookie(n) || localStorage.getItem(n) || d;
        }
        function setShared(n, v) {
          localStorage.setItem(n, v);
          setCookie(n, v);
        }
        var theme = getShared('brewcode_theme', 'dark');
        var lang = getShared('brewcode_lang', 'en');
        function applyTheme(t) {
          document.documentElement.setAttribute('data-theme', t);
          document.querySelector('#bc-theme-btn').textContent = t === 'dark' ? '🌙' : '☀️';
          var isDark = t === 'dark';
          var root = document.documentElement.style;
          root.setProperty('--bg', isDark ? '#1a1a2e' : '#f5f0eb');
          root.setProperty('--bg-card', isDark ? '#222244' : '#ffffff');
          root.setProperty('--bg-card-hover', isDark ? '#2a2a50' : '#f0ece6');
          root.setProperty('--bg-input', isDark ? '#16162a' : '#ffffff');
          root.setProperty('--text', isDark ? '#e0e0e8' : '#1a1a2e');
          root.setProperty('--text-dim', isDark ? '#8888aa' : '#666680');
          root.setProperty('--text-label', isDark ? '#aaaac0' : '#666680');
          root.setProperty('--accent', isDark ? '#e8a850' : '#b87333');
          root.setProperty('--accent-dim', isDark ? '#c08030' : '#9a5c20');
          root.setProperty('--border', isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.1)');
          root.setProperty(
            '--border-focus',
            isDark ? 'rgba(232,168,80,0.4)' : 'rgba(184,115,51,0.4)'
          );
        }
        function applyLang(l) {
          document.querySelector('#bc-lang-btn').textContent = l === 'zh' ? 'EN' : '中';
        }
        applyTheme(theme);
        applyLang(lang);
        BrewCodeI18n.setLang(lang);
        document.querySelector('#bc-theme-btn').addEventListener('click', function () {
          theme = theme === 'dark' ? 'light' : 'dark';
          setShared('brewcode_theme', theme);
          applyTheme(theme);
        });
        document.querySelector('#bc-lang-btn').addEventListener('click', function () {
          var newLang = BrewCodeI18n.getLang() === 'zh' ? 'en' : 'zh';
          BrewCodeI18n.setLang(newLang);
          setShared('brewcode_lang', newLang);
          applyLang(newLang);
        });
        var hamburger = document.querySelector('#bc-hamburger');
        var links = document.querySelector('#bc-links');
        hamburger.addEventListener('click', function () {
          links.classList.toggle('open');
        });
        document.addEventListener('click', function (e) {
          if (!e.target.closest('#bc-navbar')) {
            links.classList.remove('open');
          }
        });
      })();
    </script>
