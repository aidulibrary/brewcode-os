<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="BrewCode OS BrewPlayer - .brew 文件冲煮播放器" />
    <title>BrewPlayer</title>
    <link rel="stylesheet" href="player.css" />
    <link rel="manifest" href="manifest.json" />
    <style>
      .bc-navbar {
        display: flex;
        align-items: center;
        gap: 16px;
        height: 48px;
        padding: 0 20px;
        background: var(--bg, #1a1a2e);
        color: var(--text, #e0e0e8);
        border-bottom: 1px solid var(--border, rgba(255, 255, 255, 0.08));
        font-size: 14px;
        position: sticky;
        top: 0;
        z-index: 1000;
        box-sizing: border-box;
        flex-wrap: nowrap;
      }
      .bc-navbar .bc-logo {
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: inherit;
        flex-shrink: 0;
      }
      .bc-navbar .bc-logo svg {
        width: 22px;
        height: 22px;
      }
      .bc-navbar .bc-logo span {
        font-weight: 600;
      }
      .bc-navbar .bc-links {
        display: flex;
        gap: 8px;
        flex: 1;
        justify-content: flex-end;
      }
      .bc-navbar .bc-links a {
        color: var(--text-dim, #8888aa);
        text-decoration: none;
        padding: 6px 12px;
        border-radius: var(--radius-sm, 8px);
        transition:
          color 0.2s,
          background 0.2s;
        white-space: nowrap;
      }
      .bc-navbar .bc-links a.active {
        color: var(--accent, #e8a850);
        border-bottom: 2px solid var(--accent, #e8a850);
      }
      .bc-navbar .bc-links a:hover {
        color: var(--text, #e0e0e8);
        background: rgba(255, 255, 255, 0.05);
      }
      .bc-navbar .bc-actions {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-shrink: 0;
      }
      .bc-navbar .bc-actions button {
        background: none;
        border: 1px solid var(--border, rgba(255, 255, 255, 0.08));
        color: var(--text-dim, #8888aa);
        padding: 4px 10px;
        border-radius: var(--radius-sm, 8px);
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
        transition:
          color 0.2s,
          border-color 0.2s;
      }
      .bc-navbar .bc-actions button:hover {
        color: var(--text, #e0e0e8);
        border-color: var(--accent, #e8a850);
      }
      .bc-navbar .bc-hamburger {
        display: none;
        background: none;
        border: none;
        color: var(--text, #e0e0e8);
        font-size: 20px;
        cursor: pointer;
      }
      @media (max-width: 640px) {
        .bc-navbar .bc-links {
          display: none;
          position: absolute;
          top: 48px;
          left: 0;
          right: 0;
          flex-direction: column;
          background: var(--bg, #1a1a2e);
          border-bottom: 1px solid var(--border, rgba(255, 255, 255, 0.08));
          padding: 8px 0;
          z-index: 999;
        }
        .bc-navbar .bc-links.open {
          display: flex;
        }
        .bc-navbar .bc-hamburger {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <!-- 导航栏（v0.9 — 统一导航栏试点） -->
    <nav class="bc-navbar" id="bc-navbar">
      <a class="bc-logo" href="https://brewcode.礼字号.中国">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" />
          <text x="12" y="17" text-anchor="middle" font-size="14" fill="currentColor">{}</text>
        </svg>
        <span>BrewCode</span>
      </a>
      <button class="bc-hamburger" id="bc-hamburger" aria-label="菜单">☰</button>
      <div class="bc-links" id="bc-links">
        <a href="https://brewcode.礼字号.中国">首页</a>
        <a href="https://player.礼字号.中国" class="active">Player</a>
        <a href="https://repo.礼字号.中国">Repo</a>
        <a href="https://forge.礼字号.中国">Forge</a>
      </div>
      <div class="bc-actions">
        <button id="bc-theme-btn" title="切换主题">🌙</button>
        <button id="bc-lang-btn" title="切换语言">EN</button>
      </div>
    </nav>
    <script>
      (function () {
        var isLocal = window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        function getCookie(n) { var m = document.cookie.match(new RegExp('(^| )' + n + '=([^;]+)')); return m ? m[2] : null; }
        function setCookie(n, v) { document.cookie = n + '=' + v + '; path=/; max-age=31536000; SameSite=Lax' + (isLocal ? '' : '; domain=.礼字号.中国'); }
        function getShared(n, d) { return getCookie(n) || localStorage.getItem(n) || d; }
        function setShared(n, v) { localStorage.setItem(n, v); setCookie(n, v); }
        var theme = getShared('brewcode_theme', 'dark');
        var lang = getShared('brewcode_lang', 'zh');
        function applyTheme(t) {
          document.documentElement.setAttribute('data-theme', t);
          document.querySelector('#bc-theme-btn').textContent = t === 'dark' ? '🌙' : '☀️';
          var isDark = t === 'dark';
          var root = document.documentElement.style;
          root.setProperty('--bg',        isDark ? '#1a1a2e' : '#f5f0eb');
          root.setProperty('--bg-card',   isDark ? '#222244' : '#ffffff');
          root.setProperty('--bg-card-hover', isDark ? '#2a2a50' : '#f0ece6');
          root.setProperty('--text',      isDark ? '#e0e0e8' : '#1a1a2e');
          root.setProperty('--text-dim',  isDark ? '#8888aa' : '#666680');
          root.setProperty('--accent',    isDark ? '#e8a850' : '#b87333');
          root.setProperty('--accent-dim', isDark ? '#c08030' : '#9a5c20');
          root.setProperty('--border',    isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.1)');
        }
        function applyLang(l) {
          document.querySelector('#bc-lang-btn').textContent = l === 'zh' ? 'EN' : '中';
        }
        applyTheme(theme);
        applyLang(lang);
        document.querySelector('#bc-theme-btn').addEventListener('click', function () {
          theme = theme === 'dark' ? 'light' : 'dark';
          setShared('brewcode_theme', theme);
          applyTheme(theme);
        });
        document.querySelector('#bc-lang-btn').addEventListener('click', function () {
          lang = lang === 'zh' ? 'en' : 'zh';
          setShared('brewcode_lang', lang);
          applyLang(lang);
        });
        var hamburger = document.querySelector('#bc-hamburger');
        var links = document.querySelector('#bc-links');
        links.querySelectorAll('a').forEach(function(link) {
          link.addEventListener('click', function() { links.classList.remove('open'); });
        });
        hamburger.addEventListener('click', function () {
          links.classList.toggle('open');
        });
        document.addEventListener('click', function (e) {
          if (!e.target.closest('#bc-navbar')) {
            links.classList.remove('open');
          }
        });
      })();
    </script>
    <div id="app">
      <div id="load-screen">
        <div class="load-inner">
          <h1 class="brand">BrewPlayer</h1>
          <p class="sub">载入 .brew 文件，开始冲煮</p>
          <div class="load-actions">
            <button id="btn-paste" class="btn">粘贴 JSON</button>
            <button id="btn-file" class="btn btn-ghost">打开文件</button>
            <input type="file" id="file-input" accept=".brew,.json" hidden />
          </div>
          <div id="paste-area" class="paste-area hidden">
            <textarea id="paste-text" placeholder="在此粘贴 .brew 文件内容..."></textarea>
            <div class="paste-actions">
              <button id="btn-load" class="btn">载入</button>
              <button id="btn-cancel" class="btn btn-ghost">取消</button>
            </div>
          </div>
          <p id="load-error" class="error hidden"></p>
          <p class="url-hint">或在 URL 后添加 ?brew=文件URL 直接打开</p>
        </div>
      </div>

      <div id="brew-screen" class="hidden">
        <header id="brew-header">
          <button id="btn-back" class="btn-icon" title="返回">←</button>
          <div class="header-info">
            <span id="header-name"></span>
            <span id="header-step" class="header-step"></span>
          </div>
        </header>

        <main id="brew-main">
          <div id="overview" class="hidden">
            <div class="card">
              <h2 id="ov-name"></h2>
              <p id="ov-author" class="meta"></p>
              <p id="ov-desc" class="meta"></p>
            </div>
            <div class="card card-sm">
              <h3>咖啡豆</h3>
              <p id="ov-coffee"></p>
            </div>
            <div class="card card-sm">
              <h3>器具</h3>
              <p id="ov-equipment"></p>
            </div>
            <div class="card card-sm">
              <h3>参数</h3>
              <div id="ov-recipe" class="param-grid"></div>
            </div>
            <button id="btn-start" class="btn btn-primary btn-large">开始冲煮</button>
          </div>

          <div id="step-view" class="hidden">
            <div class="step-progress">
              <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
              </div>
              <span id="progress-text"></span>
            </div>

            <div class="step-card">
              <div class="step-badge" id="step-badge"></div>
              <p class="step-action" id="step-action"></p>
              <p class="step-desc" id="step-desc"></p>

              <div id="step-water" class="step-water hidden">
                <span class="water-label">注水</span>
                <span class="water-value" id="water-value"></span>
                <span class="water-target" id="water-target"></span>
              </div>

              <div id="step-pour-info" class="step-pour hidden">
                <span id="pour-style"></span>
                <span id="pour-intensity"></span>
              </div>

              <div id="timer-display" class="timer hidden">
                <span id="timer-value">00:00</span>
              </div>

              <div class="step-controls">
                <button id="btn-timer" class="btn btn-timer hidden">开始计时</button>
                <button id="btn-next" class="btn btn-primary">下一步</button>
              </div>
            </div>
          </div>

          <div id="done-view" class="hidden">
            <div class="card done-card">
              <h2>冲煮完成</h2>
              <p id="done-msg"></p>
              <div id="done-result" class="hidden">
                <h3>结果记录</h3>
                <div id="done-result-content"></div>
              </div>
              <div class="done-actions">
                <button id="btn-restart" class="btn btn-ghost">重新开始</button>
                <button id="btn-new" class="btn">载入新方案</button>
                <button id="btn-back-to-forge" class="btn btn-ghost">✏️ 回 Forge 调整</button>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="player.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
  </body>
</html>
