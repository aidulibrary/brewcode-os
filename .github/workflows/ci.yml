name: BrewCode OS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨 2 点 UTC

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install ajv-cli
        run: npm install -g ajv-cli
      - name: Validate all .brew files
        run: |
          SCHEMA="packages/standards/brew.schema.json"
          COUNT=0; FAIL=0
          for f in $(find packages/player/seeds -name "*.brew.json"); do
            COUNT=$((COUNT+1))
            if ajv validate -s "$SCHEMA" -d "$f" --strict=false 2>&1; then
              echo "PASS: $f"
            else
              echo "FAIL: $f"
              FAIL=$((FAIL+1))
            fi
          done
          echo "Validated $COUNT files, $FAIL failures"
          test "$FAIL" -eq 0 || { echo "Schema validation failed"; exit 1; }


  smoke-api:
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - name: Smoke — API gateway
        run: |
          echo "=== /diagnose 无 Key → 401 ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.礼字号.中国/diagnose)
          test "$STATUS" = "401" || { echo "FAIL: expected 401, got $STATUS"; exit 1; }
          echo "PASS: $STATUS"

          echo "=== /translate → 公共路由 ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.礼字号.中国/translate)
          test "$STATUS" = "400" || { echo "FAIL: expected 400, got $STATUS"; exit 1; }
          echo "PASS: $STATUS"

          echo "=== /nonexistent → 404 ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.礼字号.中国/nonexistent)
          test "$STATUS" = "404" || { echo "FAIL: expected 404, got $STATUS"; exit 1; }
          echo "PASS: $STATUS"

      - name: Smoke — bk_test Key 已死
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.礼字号.中国/diagnose \
            -H "Authorization: Bearer bk_test1234567890abcdef")
          test "$STATUS" = "401" || { echo "FAIL: test key still alive ($STATUS)"; exit 1; }
          echo "PASS: test key dead"

  smoke-pages:
    runs-on: ubuntu-latest
    needs: smoke-api
    steps:
      - name: Smoke — frontend sites
        run: |
          for SITE in \
            "https://brewcode.礼字号.中国" \
            "https://player.礼字号.中国" \
            "https://repo.礼字号.中国" \
            "https://forge.礼字号.中国"
          do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SITE")
            test "$STATUS" = "200" || { echo "FAIL: $SITE → $STATUS"; exit 1; }
            echo "PASS: $SITE → 200"
          done

  check-recipes-updated:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Check community-recipes.json is up to date
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | grep 'seeds/community/.*\.brew\.json' || true)
          if [ -z "$CHANGED" ]; then
            echo "No community recipes changed — skipping check"
            exit 0
          fi
          echo "Community recipes changed:"
          echo "$CHANGED"
          echo ""
          node scripts/generate-community-recipes.js
          if ! git diff --exit-code packages/repo/community-recipes.json; then
            echo ""
            echo "ERROR: community-recipes.json is out of date!"
            echo "Run: node scripts/generate-community-recipes.js"
            echo "Then commit the updated community-recipes.json"
            exit 1
          fi
          echo "PASS: community-recipes.json is up to date"
