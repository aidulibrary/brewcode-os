name: "BrewCode Compatible 认证申请 / Certification Application"
description: 提交硬件设备 BrewCode Compatible 认证申请
title: "[认证申请] 厂商名 - 设备型号"
labels: ["certification"]
body:
  - type: markdown
    attributes:
      value: |
        ## BrewCode Compatible 认证申请

        请完整填写以下信息。提交前确认已阅读 [BrewCode Compatible 认证规范 v1.0](https://brewcode.礼字号.中国/certified/spec)。

        Please fill in all fields below. Review the [Certification Specification v1.0](https://brewcode.礼字号.中国/certified/spec) before submitting.

  - type: input
    id: manufacturer
    attributes:
      label: "厂商全称 / Manufacturer Full Name"
      description: "公司或个人的法定名称"
    validations:
      required: true

  - type: input
    id: website
    attributes:
      label: "厂商官网 / Manufacturer Website"
      description: "官方网站 URL（如无请填 N/A）"
    validations:
      required: false

  - type: input
    id: contact_name
    attributes:
      label: "联系人 / Contact Name"
    validations:
      required: true

  - type: input
    id: contact_email
    attributes:
      label: "联系邮箱 / Contact Email"
    validations:
      required: true

  - type: input
    id: device_model
    attributes:
      label: "设备型号 / Device Model"
      description: "申请认证的设备型号名称"
    validations:
      required: true

  - type: dropdown
    id: device_type
    attributes:
      label: "设备类型 / Device Type"
      options:
        - "手冲设备 / Pour-over Device"
        - "意式咖啡机 / Espresso Machine"
        - "研磨设备 / Grinder"
        - "冲煮辅助设备 / Brewing Accessory"
        - "其他 / Other"
    validations:
      required: true

  - type: dropdown
    id: level
    attributes:
      label: "申请等级 / Applied Level"
      description: "L1 永久免费，L2 $99/年，L3 $299/年"
      options:
        - "L1 Ready（就绪级）"
        - "L2 Interactive（交互级）"
        - "L3 Native（原生级）"
    validations:
      required: true

  - type: input
    id: product_url
    attributes:
      label: "产品页面 / Product Page URL"
      description: "设备的产品介绍页面（如无请填 N/A）"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: "设备技术概述 / Device Technical Overview"
      description: "简述设备技术架构、支持的通信协议、参数接收方式（500字以内）"
    validations:
      required: true

  - type: textarea
    id: parameter_mapping
    attributes:
      label: "参数映射说明 / Parameter Mapping"
      description: "设备如何映射 .brew 文件中的核心参数（temperature/weight/time/grind_size/flow_rate）为设备可执行的指令。L2/L3 级别还需说明 steps 数组执行方式。"
    validations:
      required: true

  - type: checkboxes
    id: agreement
    attributes:
      label: "申请确认 / Submission Confirmation"
      options:
        - label: "我已阅读并理解 BrewCode Compatible 认证规范 v1.0"
          required: true
        - label: "我理解本认证为互操作性认证，非品质认证"
          required: true
        - label: "我同意按认证规范第 6 章规定的费用标准支付相应费用（如有）"
          required: true
